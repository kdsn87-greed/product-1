<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 저녁 뭐 먹지?</title>
    <link rel="stylesheet" href="menu.css">
</head>
<body>
    <div class="steam" aria-hidden="true">
        <span></span><span></span><span></span>
        <span></span><span></span>
    </div>

    <div class="layout">
        <header>
            <div class="brand">
                <span class="brand-icon">🍽️</span>
                <span class="brand-name">오늘 저녁</span>
            </div>
            <button id="theme-toggle" aria-label="테마 전환">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>

        <main>
            <section class="hero">
                <p class="eyebrow">랜덤 메뉴 추천기</p>
                <h1>오늘 저녁<br><em>뭐 먹지?</em></h1>
                <p class="hero-sub">고민 끝! 카테고리를 골라 추천받으세요</p>
            </section>

            <div class="cat-buttons">
                <button class="cat-btn active" data-cat="전체">전체</button>
                <button class="cat-btn" data-cat="한식">🇰🇷 한식</button>
                <button class="cat-btn" data-cat="중식">🥢 중식</button>
                <button class="cat-btn" data-cat="일식">🍱 일식</button>
                <button class="cat-btn" data-cat="양식">🍴 양식</button>
            </div>

            <button id="pick-btn">
                <span class="btn-inner">
                    <span class="dice-icon">🎲</span>
                    메뉴 추천받기
                </span>
            </button>

            <div class="result-card" id="result-card" hidden>
                <div class="result-emoji" id="result-emoji"></div>
                <div class="result-name"  id="result-name"></div>
                <span class="result-badge" id="result-badge"></span>
                <p class="result-msg"    id="result-msg"></p>
                <button class="reroll-btn" id="reroll-btn">다시 추천받기 ↺</button>
            </div>

            <div class="menu-grid" id="menu-grid"></div>
        </main>

        <footer>
            <p>오늘도 맛있는 저녁 드세요 🙏</p>
        </footer>
    </div>

    <script src="menu.js"></script>
</body>
</html>

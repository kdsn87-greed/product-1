<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 6/45 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="layout">
        <header>
            <div class="brand">
                <div class="brand-mark">L</div>
                <div class="brand-name">LOTTO <span>6/45</span></div>
            </div>
            <button id="theme-toggle" aria-label="테마 전환">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>

        <main>
            <section class="hero">
                <p class="eyebrow">자동 번호 생성 시스템</p>
                <h1>행운의 숫자를<br><em>찾아드립니다</em></h1>
                <p class="hero-sub">1부터 45까지 · 6개 숫자 · 5회 동시 추첨</p>
                <button id="generate-btn">
                    <span class="btn-inner">
                        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/>
                        </svg>
                        번호 생성하기
                    </span>
                </button>
            </section>

            <section class="results" id="results">
                <div class="results-placeholder" id="placeholder">
                    <div class="ph-balls">
                        <span></span><span></span><span></span>
                        <span></span><span></span><span></span>
                    </div>
                    <p>버튼을 눌러 행운의 번호를 생성하세요</p>
                </div>
            </section>
        </main>

        <footer>
            <p>번호는 무작위로 생성됩니다 · 당첨을 보장하지 않습니다</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제휴 문의 — KDSN87</title>
    <meta name="description" content="KDSN87 서비스의 광고, 제휴, 협업 문의를 남겨주세요. 빠르게 검토 후 연락드리겠습니다.">
    <link rel="stylesheet" href="contact.css">
    <meta name="google-adsense-account" content="ca-pub-8205038203255502">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8205038203255502"
        crossorigin="anonymous"></script>
</head>
<body>
    <div class="layout">
        <header>
            <div class="header-left">
                <a href="index.html" class="back-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                    홈으로
                </a>
            </div>
            <nav class="site-nav">
                <a href="index.html">🎱 로또</a>
                <a href="menu.html">🍽️ 저녁메뉴</a>
                <a href="mbti.html">🧠 MBTI</a>
                <a href="salary.html">💰 연봉계산</a>
                <a href="fortune.html">🔮 운세</a>
            </nav>
            <button id="theme-toggle" aria-label="테마 전환">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </header>

        <main>
            <section class="hero">
                <p class="eyebrow">Partnership & Inquiry</p>
                <h1>제휴 문의</h1>
                <p class="hero-sub">광고, 협업, 제안 등 편하게 남겨주세요.<br>빠르게 검토 후 연락드리겠습니다.</p>
            </section>

            <div class="form-card" id="form-wrap">
                <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" id="contact-form" novalidate>

                    <!-- Honeypot (spam 방지) -->
                    <input type="text" name="_gotcha" style="display:none" tabindex="-1" autocomplete="off">

                    <div class="field-row two-col">
                        <div class="field">
                            <label for="name">이름 <span class="req">*</span></label>
                            <input type="text" id="name" name="name" placeholder="홍길동" required>
                        </div>
                        <div class="field">
                            <label for="email">이메일 <span class="req">*</span></label>
                            <input type="email" id="email" name="email" placeholder="hello@example.com" required>
                        </div>
                    </div>

                    <div class="field-row two-col">
                        <div class="field">
                            <label for="company">회사 / 소속</label>
                            <input type="text" id="company" name="company" placeholder="(주)예시회사">
                        </div>
                        <div class="field">
                            <label for="type">문의 유형 <span class="req">*</span></label>
                            <select id="type" name="type" required>
                                <option value="" disabled selected>선택해주세요</option>
                                <option value="광고">광고 문의</option>
                                <option value="제휴">서비스 제휴</option>
                                <option value="협업">콘텐츠 협업</option>
                                <option value="투자">투자 / IR</option>
                                <option value="기타">기타</option>
                            </select>
                        </div>
                    </div>

                    <div class="field">
                        <label for="message">문의 내용 <span class="req">*</span></label>
                        <textarea id="message" name="message" rows="5" placeholder="문의하실 내용을 자유롭게 적어주세요." required></textarea>
                    </div>

                    <button type="submit" id="submit-btn">
                        <span class="btn-text">문의 보내기</span>
                        <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"/>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                        </svg>
                    </button>
                </form>
            </div>

            <!-- 전송 완료 메시지 -->
            <div class="success-card" id="success-card" hidden>
                <div class="success-icon">✅</div>
                <h2>문의가 전송되었습니다!</h2>
                <p>빠른 시일 내에 입력하신 이메일로 연락드리겠습니다.</p>
                <a href="index.html" class="home-btn">홈으로 돌아가기</a>
            </div>
        </main>

        <footer>
            <p>© 2026 KDSN87 · <a href="index.html">로또</a> · <a href="menu.html">저녁메뉴</a> · <a href="mbti.html">MBTI</a> · <a href="salary.html">연봉계산</a> · <a href="fortune.html">운세</a> · <a href="about.html">소개</a> · <a href="privacy.html">개인정보처리방침</a></p>
        </footer>
    </div>

    <script src="contact.js"></script>
</body>
</html>
